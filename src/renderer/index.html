<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBX Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <div class="toolbar hidden">
      <div class="toolbar-actions">
        <button id="openBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Open File
        </button>
        <button id="openFolderBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          Open Folder
        </button>
        <button id="saveBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Save
        </button>
        <button id="extractBtn" disabled title="Extract images to a folder">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Extract
        </button>
        <div class="toolbar-divider"></div>
        <button id="fitWidthBtn" class="fit-btn" title="Fit to Width">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
          </svg>
        </button>
        <button id="fitHeightBtn" class="fit-btn active" title="Fit to Height">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 15v6h6M19 9V3h-6M5 21l7-7M19 3l-7 7" />
          </svg>
        </button>
      </div>
    </div>

    <div class="main-content">
      <aside class="sidebar hidden">
        <div class="sidebar-header">
          <span class="sidebar-title">Pages</span>
          <span id="pageCount">—</span>
        </div>
        <div id="pageList" class="page-list"></div>
      </aside>

      <section class="viewer">
        <div id="dropZone" class="drop-zone">
          <svg class="drop-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="16" width="48" height="36" rx="6" stroke="currentColor" stroke-width="2.5" fill="none" />
            <path d="M8 24h48" stroke="currentColor" stroke-width="2.5" />
            <path d="M8 20c0-2.2 1.8-4 4-4h12l4 4H8z" fill="currentColor" opacity="0.3" />
            <path d="M32 34v10M27 39l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
          <p>Drop a .cbz file here</p>
          <p class="drop-sub">or click Open above</p>
        </div>
        <div id="previewContainer" class="preview-container hidden">
          <img id="prevImage" class="preview-image" alt="Previous page">
          <img id="currentImage" class="preview-image" alt="Current page">
          <img id="nextImage" class="preview-image" alt="Next page">
        </div>
      </section>
    </div>
  </div>

  <div id="renameModal" class="modal hidden">
    <div class="modal-content">
      <h3>Save File As</h3>
      <input type="text" id="renameInput" class="rename-input" />
      <div class="modal-actions">
        <button id="cancelRenameBtn" class="btn-secondary">Cancel</button>
        <button id="confirmRenameBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="loader" class="loader-overlay hidden">
    <div class="spinner"></div>
    <div class="loader-text">Loading comic…</div>
  </div>

  <input type="file" id="fileInput" accept=".cbz,.cbr" hidden>
  <script type="module" src="script.js"></script>
</body>

</html>
