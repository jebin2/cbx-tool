<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBX Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="titlebar">
      <div class="win-controls">
        <button class="win-btn close-btn"    id="closeBtn"    title="Close"></button>
        <button class="win-btn minimize-btn" id="minimizeBtn" title="Minimize"></button>
        <button class="win-btn maximize-btn" id="maximizeBtn" title="Maximize"></button>
      </div>
      <span class="app-title">CBX Tool</span>
      <div class="toolbar-actions">
        <button id="openBtn">Open</button>
        <button id="saveBtn" disabled>Save</button>
      </div>
    </div>

    <div class="main-content">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Pages</span>
          <span id="pageCount">—</span>
        </div>
        <div id="pageList" class="page-list"></div>
      </aside>

      <section class="viewer">
        <div id="dropZone" class="drop-zone">
          <svg class="drop-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="16" width="48" height="36" rx="6" stroke="currentColor" stroke-width="2.5" fill="none"/>
            <path d="M8 24h48" stroke="currentColor" stroke-width="2.5"/>
            <path d="M8 20c0-2.2 1.8-4 4-4h12l4 4H8z" fill="currentColor" opacity="0.3"/>
            <path d="M32 34v10M27 39l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p>Drop a .cbz file here</p>
          <p class="drop-sub">or click Open above</p>
        </div>
        <img id="previewImage" class="preview-image hidden" alt="Page preview">
      </section>
    </div>
  </div>

  <div id="loader" class="loader-overlay hidden">
    <div class="spinner"></div>
    <div class="loader-text">Loading comic…</div>
  </div>

  <input type="file" id="fileInput" accept=".cbz,.cbr" hidden>
  <script type="module" src="script.js"></script>
</body>
</html>
