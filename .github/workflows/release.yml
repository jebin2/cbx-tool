name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx electrobun build --env=stable
      - name: List artifacts
        run: ls -la artifacts/
      - name: Wrap installer with setup script
        run: |
          tar -xzf artifacts/stable-linux-*-Setup.tar.gz ./installer
          chmod +x installer
          BASE64=$(base64 -w 0 installer)
          cat > CBX-Tool-Linux-Install.sh << 'SCRIPT_EOF'
#!/bin/sh
set -e

APP_ID="com.cbxtool.app"
LAUNCHER="$HOME/.local/share/$APP_ID/stable/app/bin/launcher"
BIN_LINK="$HOME/.local/bin/cbx-tool"
DESKTOP="$HOME/.local/share/applications/cbx-tool.desktop"

INSTALLER_TMP=$(mktemp /tmp/cbx-installer-XXXXXX)
tail -n +__LINES__ "$0" | base64 -d > "$INSTALLER_TMP"
chmod +x "$INSTALLER_TMP"
echo "Running CBX Tool installer..."
"$INSTALLER_TMP"
rm -f "$INSTALLER_TMP"

mkdir -p "$HOME/.local/bin"
ln -sf "$LAUNCHER" "$BIN_LINK"
echo "Created command: cbx-tool"

mkdir -p "$HOME/.local/share/applications"
cat > "$DESKTOP" << EOF
[Desktop Entry]
Name=CBX Tool
Exec=$LAUNCHER
Type=Application
Categories=Graphics;
EOF
update-desktop-database "$HOME/.local/share/applications" 2>/dev/null || true
echo "Created app menu entry"
echo ""
echo "Done! Run 'cbx-tool' or find 'CBX Tool' in your app menu."
exit 0
SCRIPT_EOF
          LINES=$(wc -l < CBX-Tool-Linux-Install.sh)
          LINES=$((LINES + 1))
          sed -i "s/__LINES__/$LINES/" CBX-Tool-Linux-Install.sh
          echo "$BASE64" >> CBX-Tool-Linux-Install.sh
          chmod +x CBX-Tool-Linux-Install.sh
      - uses: softprops/action-gh-release@v1
        with:
          files: CBX-Tool-Linux-Install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx electrobun build --env=stable
      - name: List artifacts
        run: ls -la artifacts/ && find build/ -type f
      - name: Create DMG
        run: |
          APP=$(find build/stable-macos-*/ -maxdepth 1 -name "*.app" -type d | head -1)
          echo "=== Found: $APP ==="
          hdiutil create -volname "CBX Tool" -srcfolder "$APP" -ov -format UDZO CBX-Tool-macOS.dmg
      - uses: softprops/action-gh-release@v1
        with:
          files: CBX-Tool-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx electrobun build --env=stable
      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem artifacts/ -Recurse
      - name: Collect Setup.exe
        shell: pwsh
        run: |
          $src = Get-ChildItem build/ -Recurse -Filter "*Setup.exe" | Select-Object -First 1
          Write-Host "=== Using: $($src.FullName) ==="
          Copy-Item $src.FullName "CBX-Tool-Windows-Setup.exe"
      - uses: softprops/action-gh-release@v1
        with:
          files: CBX-Tool-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
