name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      # Linux Specific: AppImage
      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir
          cp -r build/stable-linux-x64/CBXTool/* AppDir/

          # Copy icon
          cp resources/icon.png AppDir/icon.png

          # Create Desktop file
          cat > AppDir/CBXTool.desktop << 'EOF'
[Desktop Entry]
Name=CBX Tool
Exec=bin/launcher
Icon=icon
Type=Application
Categories=Graphics;
EOF

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
#!/bin/sh
HERE="$(dirname "$(readlink -f "${0}")")"
export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"
exec "$HERE/bin/launcher" "$@"
EOF
          chmod +x AppDir/AppRun

          # Download and run appimagetool
          curl -LO https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir CBX-Tool-x86_64.AppImage

      # macOS Specific: ZIP (.app bundle — directory, must be zipped)
      - name: Create App ZIP (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/stable-macos-arm64/
          zip -r ../../CBXTool.app.zip CBXTool.app

      # Windows Specific: ZIP (exe needs lib/ and Resources/ alongside it)
      - name: Create Portable ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item build/stable-win-x64/CBXTool/bin/launcher.exe build/stable-win-x64/CBXTool/bin/CBX-Tool.exe
          Compress-Archive -Path build/stable-win-x64/CBXTool/* -DestinationPath CBX-Tool-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-x86_64.AppImage
            CBXTool.app.zip
            CBX-Tool-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
