name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx electrobun build --env=stable
      - name: List artifacts
        run: ls -la artifacts/
      - name: Wrap installer with setup script
        run: |
          tar -xzf artifacts/stable-linux-*-Setup.tar.gz ./installer
          chmod +x installer
          cp scripts/linux-install-template.sh CBX-Tool-Linux-Install.sh
          LINES=$(wc -l < CBX-Tool-Linux-Install.sh)
          LINES=$((LINES + 1))
          sed -i "s/__LINES__/$LINES/" CBX-Tool-Linux-Install.sh
          base64 -w 0 installer >> CBX-Tool-Linux-Install.sh
          chmod +x CBX-Tool-Linux-Install.sh
      - uses: softprops/action-gh-release@v1
        with:
          files: CBX-Tool-Linux-Install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx electrobun build --env=stable
      - name: List artifacts
        run: ls -la artifacts/ && find build/ -type f
      - name: Create DMG
        run: |
          APP=$(find build/stable-macos-*/ -maxdepth 1 -name "*.app" -type d | head -1)
          echo "=== Found: $APP ==="
          hdiutil create -volname "CBX Tool" -srcfolder "$APP" -ov -format UDZO CBX-Tool-macOS.dmg
      - uses: softprops/action-gh-release@v1
        with:
          files: CBX-Tool-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx electrobun build --env=stable
      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem artifacts/ -Recurse
      - name: Build single-file installer (7-Zip SFX)
        shell: pwsh
        run: |
          $src = Get-ChildItem artifacts/ -Filter "*Setup.zip" | Select-Object -First 1
          Write-Host "=== Using: $($src.FullName) ==="

          # Extract zip, rename exe to remove spaces, repack as 7z
          & "C:\Program Files\7-Zip\7z.exe" x $src.FullName -o"setup_extracted"
          Rename-Item "setup_extracted\CBX Tool-Setup.exe" "CBXToolSetup.exe"
          & "C:\Program Files\7-Zip\7z.exe" a -t7z setup.7z ".\setup_extracted\*"

          # 7zSD.sfx (Setup variant) supports RunProgram — download from 7-Zip extra package
          $7zVersion = (Get-Item "C:\Program Files\7-Zip\7z.exe").VersionInfo.ProductVersion -replace '\.(\d)$','.$1'
          $extraUrl = "https://www.7-zip.org/a/7z$(($7zVersion -replace '\.','').Substring(0,4))-extra.7z"
          Write-Host "=== Downloading 7-Zip extra from: $extraUrl ==="
          Invoke-WebRequest -Uri $extraUrl -OutFile "7z-extra.7z" -ErrorAction SilentlyContinue
          if (Test-Path "7z-extra.7z") {
            & "C:\Program Files\7-Zip\7z.exe" e "7z-extra.7z" "7zSD.sfx" -o"." -y
          }
          if (-not (Test-Path "7zSD.sfx")) {
            Write-Host "Falling back to bundled 7zSD.sfx download..."
            Invoke-WebRequest -Uri "https://github.com/ip7z/7zip/releases/download/24.09/7z2409-extra.7z" -OutFile "7z-extra.7z"
            & "C:\Program Files\7-Zip\7z.exe" e "7z-extra.7z" "7zSD.sfx" -o"." -y
          }
          Write-Host "=== 7zSD.sfx available: $(Test-Path '7zSD.sfx') ==="

          $sfxConfig = ";!@Install@!UTF-8!`nTitle=`"CBX Tool`"`nRunProgram=`"CBXToolSetup.exe`"`n;!@InstallEnd@!"
          [System.IO.File]::WriteAllText("sfx_config.txt", $sfxConfig)

          cmd /c "copy /b 7zSD.sfx + sfx_config.txt + setup.7z CBX-Tool-Windows-Installer.exe"
          Write-Host "=== Created: $(Get-Item CBX-Tool-Windows-Installer.exe | Select-Object Name, Length) ==="
      - uses: softprops/action-gh-release@v1
        with:
          files: CBX-Tool-Windows-Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
