name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      # Linux Specific: AppImage
      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir
          cp -r build/stable-linux-x64/CBXTool/* AppDir/

          # Copy icon
          cp resources/icon.png AppDir/icon.png

          # Create Desktop file
          {
            echo '[Desktop Entry]'
            echo 'Name=CBX Tool'
            echo 'Exec=bin/launcher'
            echo 'Icon=icon'
            echo 'Type=Application'
            echo 'Categories=Graphics;'
          } > AppDir/CBXTool.desktop

          # Create AppRun
          {
            echo '#!/bin/sh'
            echo 'HERE="$(dirname "$(readlink -f "${0}")")"'
            echo 'export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"'
            echo 'exec "$HERE/bin/launcher" "$@"'
          } > AppDir/AppRun
          chmod +x AppDir/AppRun

          # Download and run appimagetool
          curl -LO https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir CBX-Tool-x86_64.AppImage

      # macOS Specific: ZIP (.app bundle — directory, must be zipped)
      - name: Create App ZIP (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== build/ contents ===" && ls build/
          BUILD_DIR=$(ls -d build/stable-macos-*/ | head -1)
          echo "=== Using: $BUILD_DIR ===" && ls "$BUILD_DIR"
          cd "$BUILD_DIR"
          zip -r ../../CBXTool.app.zip *.app

      # Windows Specific: ZIP (exe needs lib/ and Resources/ alongside it)
      - name: Create Portable ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item build/stable-win-x64/CBXTool/bin/launcher.exe build/stable-win-x64/CBXTool/bin/CBX-Tool.exe
          Compress-Archive -Path build/stable-win-x64/CBXTool/* -DestinationPath CBX-Tool-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-x86_64.AppImage
            CBXTool.app.zip
            CBX-Tool-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
