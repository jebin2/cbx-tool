name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      # Linux: use Setup.tar.gz from artifacts/ (self-extracting installer, ~32MB)
      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          SRC=$(find artifacts/ -name "*Setup.tar.gz" | head -1)
          echo "=== Using: $SRC ===" && ls -lh "$SRC"
          cp "$SRC" CBX-Tool-Linux-Setup.tar.gz

      # macOS: zip the .app bundle from build/ (confirmed working, ~17.5MB)
      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find build/stable-macos-*/ -maxdepth 1 -name "*.app" -type d | head -1)
          echo "=== Found: $APP ==="
          cd "$(dirname "$APP")"
          zip -r "../../CBX-Tool-macOS.zip" "$(basename "$APP")"

      # Windows: use Setup.exe from build/ (confirmed working, ~415KB)
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem build/ -Recurse -Filter "*Setup.exe" | Select-Object -First 1
          Write-Host "=== Using: $($src.FullName) ==="
          Copy-Item $src.FullName "CBX-Tool-Windows-Setup.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-Linux-Setup.tar.gz
            CBX-Tool-macOS.zip
            CBX-Tool-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
