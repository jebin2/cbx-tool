name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      - name: List artifacts (Unix)
        if: runner.os != 'Windows'
        run: find artifacts/ -type f

      - name: List artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem artifacts/ -Recurse

      # Linux: use the Setup.tar.gz from artifacts/ (contains self-extracting installer)
      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          SRC=$(find artifacts/ -name "*Setup.tar.gz" | head -1)
          echo "=== Using: $SRC ==="
          cp "$SRC" CBX-Tool-Linux-Setup.tar.gz

      # macOS: use whatever artifact electrobun produces
      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          SRC=$(find artifacts/ -type f ! -name "update.json" | head -1)
          echo "=== Using: $SRC ==="
          EXT="${SRC##*.}"
          cp "$SRC" "CBX-Tool-macOS.$EXT"

      # Windows: use whatever artifact electrobun produces
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem artifacts/ | Where-Object { $_.Name -notlike "*update.json" } | Select-Object -First 1
          Write-Host "=== Using: $($src.FullName) ==="
          $ext = $src.Extension
          Copy-Item $src.FullName "CBX-Tool-Windows$ext"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-Linux-Setup.tar.gz
            CBX-Tool-macOS.*
            CBX-Tool-Windows.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
