name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      # Linux: use the .tar.zst electrobun already produces
      - name: Package portable (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== build/ contents ===" && ls build/
          TAR=$(ls build/stable-linux-*CBXTool.tar.zst | head -1)
          echo "=== Using: $TAR ==="
          cp "$TAR" CBX-Tool-Linux.tar.zst

      # macOS: zip the .app bundle (directory, must be archived)
      - name: Package portable (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== build/ contents ===" && ls build/
          BUILD_DIR=$(ls -d build/stable-macos-*/ | head -1)
          echo "=== Using: $BUILD_DIR ===" && ls "$BUILD_DIR"
          cd "$BUILD_DIR"
          zip -r ../../CBXTool.app.zip *.app

      # Windows: rename launcher, zip the app folder
      - name: Package portable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "=== build/ contents ===" && Get-ChildItem build/
          $buildDir = (Get-ChildItem -Directory build/ | Where-Object { $_.Name -like "stable-win*" } | Select-Object -First 1).FullName
          $appDir   = (Get-ChildItem -Directory $buildDir | Select-Object -First 1).FullName
          echo "=== App dir: $appDir ===" && Get-ChildItem $appDir
          $binDir = Join-Path $appDir "bin"
          echo "=== bin/ contents ===" && Get-ChildItem $binDir
          $launcher = Get-ChildItem $binDir -Filter "*.exe" | Select-Object -First 1
          Rename-Item $launcher.FullName "CBX-Tool.exe"
          Compress-Archive -Path "$appDir\*" -DestinationPath CBX-Tool-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-Linux.tar.zst
            CBXTool.app.zip
            CBX-Tool-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
