name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      - name: List build output
        run: ls build/

      # Linux: electrobun produces a self-extracting Setup.tar.gz — use it directly
      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          SRC=$(ls build/stable-linux-*-Setup.tar.gz | head -1)
          echo "Found: $SRC"
          cp "$SRC" CBX-Tool-Linux-Setup.tar.gz

      # macOS: electrobun outputs a .app bundle directory — zip it for distribution
      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find build/stable-macos-*/ -maxdepth 1 -name "*.app" -type d | head -1)
          echo "=== Found app: $APP ==="
          cd "$(dirname "$APP")"
          zip -r "../../CBX-Tool-macOS.zip" "$(basename "$APP")"

      # Windows: electrobun produces a Setup.exe — use it directly
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem build/ -Recurse
          $src = Get-ChildItem build/ -Recurse -Filter "*Setup.exe" | Select-Object -First 1
          Write-Host "Found: $($src.FullName)"
          Copy-Item $src.FullName "CBX-Tool-Windows-Setup.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-Linux-Setup.tar.gz
            CBX-Tool-macOS.zip
            CBX-Tool-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
