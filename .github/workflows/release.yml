name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      # Linux: wrap installer in a shell script that also sets up CLI + app menu
      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          SRC=$(find artifacts/ -name "*Setup.tar.gz" | head -1)
          echo "=== Using: $SRC ==="
          tar -xzf "$SRC" ./installer
          chmod +x installer

          # Encode the installer binary as base64 to embed in the shell script
          BASE64=$(base64 -w 0 installer)

          cat > CBX-Tool-Linux-Install.sh << 'SCRIPT_EOF'
#!/bin/sh
set -e

APP_ID="com.cbxtool.app"
APP_NAME="CBX Tool"
LAUNCHER="$HOME/.local/share/$APP_ID/stable/app/bin/launcher"
BIN_LINK="$HOME/.local/bin/cbx-tool"
DESKTOP="$HOME/.local/share/applications/cbx-tool.desktop"

# Extract embedded installer binary
INSTALLER_TMP=$(mktemp /tmp/cbx-installer-XXXXXX)
tail -n +__LINES__ "$0" | base64 -d > "$INSTALLER_TMP"
chmod +x "$INSTALLER_TMP"

echo "Running CBX Tool installer..."
"$INSTALLER_TMP"
rm -f "$INSTALLER_TMP"

# Create CLI shortcut
mkdir -p "$HOME/.local/bin"
ln -sf "$LAUNCHER" "$BIN_LINK"
echo "Created command: cbx-tool"

# Create app menu entry
mkdir -p "$HOME/.local/share/applications"
cat > "$DESKTOP" << EOF
[Desktop Entry]
Name=CBX Tool
Exec=$LAUNCHER
Type=Application
Categories=Graphics;
EOF
update-desktop-database "$HOME/.local/share/applications" 2>/dev/null || true
echo "Created app menu entry"

echo ""
echo "Done! You can now:"
echo "  - Type 'cbx-tool' in terminal"
echo "  - Find 'CBX Tool' in your app menu"
exit 0
SCRIPT_EOF

          # Replace placeholder with actual line count + 1
          LINES=$(wc -l < CBX-Tool-Linux-Install.sh)
          LINES=$((LINES + 1))
          sed -i "s/__LINES__/$LINES/" CBX-Tool-Linux-Install.sh

          # Append the base64 installer at the end
          echo "$BASE64" >> CBX-Tool-Linux-Install.sh
          chmod +x CBX-Tool-Linux-Install.sh

      # macOS: zip the .app bundle from build/ (confirmed working, ~17.5MB)
      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find build/stable-macos-*/ -maxdepth 1 -name "*.app" -type d | head -1)
          echo "=== Found: $APP ==="
          cd "$(dirname "$APP")"
          zip -r "../../CBX-Tool-macOS.zip" "$(basename "$APP")"

      # Windows: use Setup.exe from build/ (confirmed working, ~415KB)
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem build/ -Recurse -Filter "*Setup.exe" | Select-Object -First 1
          Write-Host "=== Using: $($src.FullName) ==="
          Copy-Item $src.FullName "CBX-Tool-Windows-Setup.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-Linux-Install.sh
            CBX-Tool-macOS.zip
            CBX-Tool-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
