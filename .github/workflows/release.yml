name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bunx electrobun build --env=stable

      - name: List build output
        run: ls build/

      # Linux: electrobun produces a self-extracting Setup.tar.gz — use it directly
      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          SRC=$(ls build/stable-linux-*-Setup.tar.gz | head -1)
          echo "Found: $SRC"
          cp "$SRC" CBX-Tool-Linux-Setup.tar.gz

      # macOS: list all build output first, then collect
      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== full build/ tree ==="
          find build/ -type f
          SRC=$(find build/ -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.tar.gz" -o -name "*.tar.zst" \) | grep -v update.json | grep -i "setup\|installer\|CBXTool" | head -1)
          echo "=== Using: $SRC ==="
          EXT="${SRC##*.}"
          cp "$SRC" "CBX-Tool-macOS.$EXT"

      # Windows: electrobun produces a Setup.exe — use it directly
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem build/ -Recurse
          $src = Get-ChildItem build/ -Recurse -Filter "*Setup.exe" | Select-Object -First 1
          Write-Host "Found: $($src.FullName)"
          Copy-Item $src.FullName "CBX-Tool-Windows-Setup.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CBX-Tool-Linux-Setup.tar.gz
            CBX-Tool-macOS.*
            CBX-Tool-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
